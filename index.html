<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 시간표</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 커스텀 스크롤바 숨기기 (옵션) */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- 메인 앱 컨테이너 -->
    <div class="min-h-screen bg-gray-50 text-gray-800 font-sans sm:p-6 p-0 flex justify-center items-center">
        
        <!-- 1. 로딩 화면 -->
        <div id="loading-screen" class="min-h-screen w-full flex flex-col items-center justify-center bg-gray-50 text-indigo-600 gap-3 z-50">
            <i data-lucide="loader-2" class="animate-spin w-10 h-10"></i>
            <p class="text-sm font-bold text-gray-500">인증 정보를 확인하는 중입니다...</p>
        </div>

        <!-- 2. 로그인 화면 (로그인 안 했을 때 보임) -->
        <div id="login-screen" class="hidden min-h-screen w-full flex flex-col items-center justify-center bg-gray-50 p-4 z-40">
            <div class="bg-white p-8 sm:rounded-[2.5rem] rounded-3xl shadow-xl max-w-sm w-full text-center border sm:border-[8px] border-gray-100">
                <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="calendar-days" class="w-8 h-8 text-indigo-600"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-gray-900 mb-2 tracking-tight">나의 시간표</h1>
                <p class="text-sm text-gray-500 mb-8 font-medium">수업 진도와 계획을 클라우드에 안전하게 보관하세요.</p>
                
                <button onclick="window.loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 rounded-2xl px-4 py-3.5 text-sm font-bold text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-all shadow-sm active:scale-95">
                    <!-- 구글 G 로고 -->
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google 계정으로 시작하기
                </button>
            </div>
        </div>

        <!-- 3. 메인 앱 화면 (로그인 후 보임) -->
        <div id="app-container" class="hidden w-full max-w-md bg-white sm:rounded-[2.5rem] sm:shadow-2xl sm:border-[10px] border-gray-200 overflow-hidden relative flex flex-col h-[100dvh] sm:h-[850px]">
            
            <!-- 3-1. 메인 화면 (시간표) -->
            <div id="main-screen" class="flex flex-col h-full absolute w-full transition-transform duration-300 ease-in-out translate-x-0">
                <!-- JS에서 렌더링 -->
            </div>

            <!-- 3-2. 상세 타임라인 화면 -->
            <div id="detail-screen" class="absolute top-0 left-0 w-full h-full bg-[#F9FAFB] z-20 transition-transform duration-300 ease-in-out flex flex-col translate-x-full">
                <!-- JS에서 렌더링 -->
            </div>

            <!-- 3-3. 설정 화면 -->
            <div id="settings-screen" class="absolute top-0 left-0 w-full h-full bg-white z-30 transition-transform duration-400 ease-out flex flex-col translate-y-full">
                <!-- JS에서 렌더링 -->
            </div>

        </div>
    </div>

    <!-- 앱 로직 -->
    <script type="module">
        // --- 클라우드(Firebase) 초기화 ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDlEThUvDK2Dob5OhQKlAmltG4JMEVrTnk",
            authDomain: "class-tracker-df692.firebaseapp.com",
            projectId: "class-tracker-df692",
            storageBucket: "class-tracker-df692.firebasestorage.app",
            messagingSenderId: "977674109379",
            appId: "1:977674109379:web:90e4656696240f4c26bd76",
            measurementId: "G-01YLH94S61"
        };
        const app = initializeApp(firebaseConfig);
        
        let analytics;
        try {
            analytics = getAnalytics(app);
        } catch (error) {
            console.log("Analytics 초기화 건너뜀 (미지원 환경)");
        }

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'class-tracker-df692';

        // --- 상태 관리 ---
        let user = null;
        let unsubscribeSnapshot = null; // Firestore 구독 취소용

        const days = ['월', '화', '수', '목', '금'];
        const periods = [1, 2, 3, 4, 5, 6, 7];
        
        let selectedDay = '월';
        let viewMode = 'main'; // 'main', 'detail', 'settings'
        let selectedCell = null;
        let editingRecordId = null;

        // 초기 기본 데이터
        let timetable = {
            '월': { 1: '1학년 1반', 2: '1학년 2반', 4: '1학년 3반', 6: '동아리' },
            '화': { 2: '1학년 4반', 3: '1학년 1반', 5: '1학년 2반' },
            '수': { 1: '1학년 3반', 3: '1학년 4반', 4: '1학년 1반', 5: '교직원회의' },
            '목': { 2: '1학년 2반', 4: '1학년 3반', 6: '1학년 4반' },
            '금': { 1: '1학년 1반', 3: '1학년 2반', 5: '1학년 3반', 6: '1학년 4반' },
        };

        let periodTimes = {
            1: '08:50 ~ 09:35', 2: '09:45 ~ 10:30', 3: '10:40 ~ 11:25', 4: '11:35 ~ 12:20',
            5: '13:10 ~ 13:55', 6: '14:05 ~ 14:50', 7: '15:00 ~ 15:45',
        };

        let classRecords = {};
        let tempTimetable = {};
        let tempPeriodTimes = {};

        // --- 색상 유틸리티 ---
        function getClassColor(className) {
            if (!className) return 'bg-transparent border-transparent';
            if (className.includes('1반')) return 'bg-blue-100 text-blue-800 border-blue-200';
            if (className.includes('2반')) return 'bg-emerald-100 text-emerald-800 border-emerald-200';
            if (className.includes('3반')) return 'bg-violet-100 text-violet-800 border-violet-200';
            if (className.includes('4반')) return 'bg-orange-100 text-orange-800 border-orange-200';
            if (className.includes('5반')) return 'bg-pink-100 text-pink-800 border-pink-200';
            if (className.includes('6반')) return 'bg-cyan-100 text-cyan-800 border-cyan-200';
            return 'bg-gray-100 text-gray-700 border-gray-300';
        }

        // --- 아이콘 렌더링 헬퍼 ---
        function refreshIcons() {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        // --- 구글 로그인 / 로그아웃 함수 ---
        window.loginWithGoogle = async () => {
            try {
                document.getElementById('loading-screen').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("로그인 실패", error);
                alert("로그인에 실패했습니다. 팝업이 차단되었는지 확인해주세요.");
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            }
        };

        window.logout = async () => {
            if(confirm("정말 로그아웃 하시겠습니까?")) {
                try {
                    if(unsubscribeSnapshot) unsubscribeSnapshot(); // 데이터 구독 취소
                    await signOut(auth);
                    // 초기화
                    viewMode = 'main';
                    classRecords = {}; 
                } catch (error) {
                    console.error("로그아웃 실패", error);
                }
            }
        };

        // --- 인증 상태 감지 ---
        onAuthStateChanged(auth, (currentUser) => {
            user = currentUser;
            const loadingScreen = document.getElementById('loading-screen');
            const loginScreen = document.getElementById('login-screen');
            const appContainer = document.getElementById('app-container');

            if (user) {
                // 로그인 성공 시
                loginScreen.classList.add('hidden');
                
                // Firestore 데이터 불러오기
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'teacherData', 'state');
                unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.timetable) timetable = data.timetable;
                        if (data.periodTimes) periodTimes = data.periodTimes;
                        if (data.classRecords) classRecords = data.classRecords;
                    }
                    
                    // 화면 표시
                    loadingScreen.classList.add('hidden');
                    appContainer.classList.remove('hidden');
                    appContainer.classList.add('flex');
                    
                    renderAll();
                }, (error) => {
                    console.error("데이터 동기화 에러", error);
                    alert("데이터를 불러오는데 실패했습니다.");
                });

            } else {
                // 로그아웃 상태일 시
                loadingScreen.classList.add('hidden');
                appContainer.classList.add('hidden');
                appContainer.classList.remove('flex');
                loginScreen.classList.remove('hidden');
                loginScreen.classList.add('flex');
            }
        });

        // --- 클라우드 저장 ---
        window.saveToCloud = async (newTimetable, newPeriodTimes, newClassRecords) => {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'teacherData', 'state');
            try {
                await setDoc(docRef, {
                    timetable: newTimetable || timetable,
                    periodTimes: newPeriodTimes || periodTimes,
                    classRecords: newClassRecords || classRecords
                }, { merge: true });
            } catch (error) {
                console.error("저장 실패", error);
            }
        };

        // --- 트랜지션 처리 ---
        function updateViewVisibility() {
            const mainScreen = document.getElementById('main-screen');
            const detailScreen = document.getElementById('detail-screen');
            const settingsScreen = document.getElementById('settings-screen');

            mainScreen.className = `flex flex-col h-full absolute w-full transition-transform duration-300 ease-in-out ${viewMode === 'main' ? 'translate-x-0' : '-translate-x-full'}`;
            detailScreen.className = `absolute top-0 left-0 w-full h-full bg-[#F9FAFB] z-20 transition-transform duration-300 ease-in-out flex flex-col ${viewMode === 'detail' ? 'translate-x-0' : 'translate-x-full'}`;
            settingsScreen.className = `absolute top-0 left-0 w-full h-full bg-white z-30 transition-transform duration-400 ease-out flex flex-col ${viewMode === 'settings' ? 'translate-y-0' : 'translate-y-full'}`;
        }

        // --- 렌더링 메인 함수 ---
        function renderAll() {
            if (viewMode === 'main') renderMain();
            else if (viewMode === 'detail') renderDetail();
            else if (viewMode === 'settings') renderSettings();
        }

        // --- 화면 전환 및 액션 전역 함수 ---
        window.setDay = (day) => {
            selectedDay = day;
            renderMain();
        };

        window.openSettings = () => {
            tempTimetable = JSON.parse(JSON.stringify(timetable));
            tempPeriodTimes = JSON.parse(JSON.stringify(periodTimes));
            viewMode = 'settings';
            updateViewVisibility();
            renderSettings();
        };

        window.closeSettings = () => {
            viewMode = 'main';
            updateViewVisibility();
            renderMain();
        };

        window.saveSettings = () => {
            timetable = JSON.parse(JSON.stringify(tempTimetable));
            periodTimes = JSON.parse(JSON.stringify(tempPeriodTimes));
            window.saveToCloud(timetable, periodTimes, null);
            viewMode = 'main';
            updateViewVisibility();
            renderMain();
        };

        window.openDetail = (day, period, className) => {
            if (!classRecords[className]) {
                classRecords[className] = [];
                window.saveToCloud(null, null, classRecords);
            }
            selectedCell = { day, period, className };
            editingRecordId = null;
            viewMode = 'detail';
            updateViewVisibility();
            renderDetail();
        };

        window.closeDetail = () => {
            viewMode = 'main';
            updateViewVisibility();
            renderMain();
        };

        window.addRecord = () => {
            const className = selectedCell.className;
            const today = new Date();
            const dateString = `${today.getFullYear()}. ${today.getMonth() + 1}. ${today.getDate()}.`;
            
            const newRecord = {
                id: Date.now().toString(),
                date: dateString,
                currentProgress: '',
                nextLesson: '',
                worksheetGiven: false
            };

            classRecords[className] = [newRecord, ...(classRecords[className] || [])];
            editingRecordId = newRecord.id;
            window.saveToCloud(null, null, classRecords);
            renderDetail();
        };

        window.setEditing = (id) => {
            editingRecordId = id;
            renderDetail();
        };

        window.finishEdit = () => {
            editingRecordId = null;
            window.saveToCloud(null, null, classRecords);
            renderDetail();
        };

        window.deleteRecord = (id) => {
            if(confirm("이 기록을 삭제하시겠습니까?")) {
                const className = selectedCell.className;
                classRecords[className] = classRecords[className].filter(r => r.id !== id);
                window.saveToCloud(null, null, classRecords);
                renderDetail();
            }
        };

        window.updateRecordField = (id, field, value) => {
            const className = selectedCell.className;
            const record = classRecords[className].find(r => r.id === id);
            if(record) {
                record[field] = value;
            }
        };

        window.toggleWorksheet = (event, id) => {
            const className = selectedCell.className;
            const record = classRecords[className].find(r => r.id === id);
            if (record) {
                record.worksheetGiven = !record.worksheetGiven;
                window.saveToCloud(null, null, classRecords);
                
                // DOM을 직접 업데이트하여 포커스 유지
                const iconContainer = event.currentTarget.querySelector('.worksheet-icon');
                const textContainer = event.currentTarget.querySelector('.worksheet-text');
                
                if (record.worksheetGiven) {
                    textContainer.classList.remove('text-gray-400');
                    textContainer.classList.add('text-indigo-500');
                    iconContainer.innerHTML = '<i data-lucide="check-circle-2" class="text-indigo-600 w-6 h-6"></i>';
                } else {
                    textContainer.classList.remove('text-indigo-500');
                    textContainer.classList.add('text-gray-400');
                    iconContainer.innerHTML = '<i data-lucide="circle" class="text-gray-300 w-6 h-6"></i>';
                }
                refreshIcons();
            }
        };

        // 설정용
        window.setSettingsDay = (day) => {
            selectedDay = day;
            renderSettings();
        };

        window.updateTempClass = (day, period, value) => {
            if(!tempTimetable[day]) tempTimetable[day] = {};
            tempTimetable[day][period] = value;
        };

        window.updateTempPeriod = (period, value) => {
            tempPeriodTimes[period] = value;
        };


        // --- 뷰 렌더링 로직 ---

        function renderMain() {
            const container = document.getElementById('main-screen');
            
            let daysHtml = days.map(day => `
                <button onclick="window.setDay('${day}')" class="flex-1 py-3 text-sm font-bold rounded-2xl transition-all ${
                    selectedDay === day ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200 transform scale-105' : 'text-gray-500 hover:bg-gray-50'
                }">
                    ${day}
                </button>
            `).join('');

            let periodsHtml = periods.map(period => {
                const className = timetable[selectedDay]?.[period] || '';
                const hasClass = className.trim() !== '';
                const latestRecord = hasClass && classRecords[className] && classRecords[className].length > 0 ? classRecords[className][0] : null;
                const timeHtml = (periodTimes[period] || '').split('~').map((t, i) => `${t.trim()}${i === 0 ? '<br/>' : ''}`).join('');

                return `
                <div ${hasClass ? `onclick="window.openDetail('${selectedDay}', ${period}, '${className}')"` : ''} 
                     class="flex items-stretch bg-white rounded-3xl overflow-hidden border ${hasClass ? 'cursor-pointer hover:shadow-md transition-all active:scale-[0.98] border-gray-200 shadow-sm' : 'border-transparent opacity-60'}">
                    <div class="w-20 flex flex-col items-center justify-center py-3 border-r border-gray-100 ${hasClass ? 'bg-gray-50' : 'bg-transparent'}">
                        <span class="text-lg font-black text-gray-800">${period}<span class="text-[10px] font-bold text-gray-400 ml-0.5">교시</span></span>
                        ${periodTimes[period] ? `<span class="text-[9px] font-semibold text-gray-400 mt-1 px-1 text-center leading-tight">${timeHtml}</span>` : ''}
                    </div>

                    <div class="flex-1 p-4 flex items-center justify-between">
                        ${hasClass ? `
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1.5 rounded-xl text-sm font-bold border ${getClassColor(className)}">
                                    ${className}
                                </span>
                                <span class="text-xs text-gray-500 font-medium hidden sm:inline-block truncate max-w-[100px]">
                                    ${latestRecord && latestRecord.currentProgress ? latestRecord.currentProgress : '기록 없음'}
                                </span>
                            </div>
                        ` : `
                            <span class="text-gray-300 font-medium italic text-sm">- 공강 -</span>
                        `}
                        ${hasClass ? `<i data-lucide="chevron-left" class="text-gray-400 rotate-180 w-5 h-5"></i>` : ''}
                    </div>
                </div>
                `;
            }).join('');

            // 프로필 사진 또는 첫 글자 가져오기
            const profilePic = user?.photoURL ? `<img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-gray-200" alt="profile"/>` : `<div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold flex items-center justify-center">${user?.email?.charAt(0).toUpperCase() || 'U'}</div>`;

            container.innerHTML = `
                <header class="bg-white pt-12 pb-4 px-6 border-b border-gray-100 flex-shrink-0 flex justify-between items-end z-10">
                    <div>
                        <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight flex items-center gap-2">
                            <i data-lucide="calendar-days" class="text-indigo-600 w-6 h-6"></i>
                            나의 시간표
                        </h1>
                        <p class="text-sm text-gray-500 font-medium mt-1">수업을 터치하여 주간 진도를 기록하세요.</p>
                    </div>
                    <button onclick="window.openSettings()" class="flex items-center gap-2 p-1.5 rounded-full transition-colors hover:bg-gray-50 mb-1">
                        ${profilePic}
                    </button>
                </header>

                <div class="flex bg-white border-b border-gray-100 px-2 py-2 flex-shrink-0 shadow-sm z-10">
                    ${daysHtml}
                </div>

                <div class="flex-1 overflow-y-auto bg-gray-50/50 p-4 pb-20">
                    <div class="space-y-3">
                        ${periodsHtml}
                    </div>
                </div>
            `;
            refreshIcons();
        }

        function renderDetail() {
            if (!selectedCell) return;
            const container = document.getElementById('detail-screen');
            const records = classRecords[selectedCell.className] || [];
            
            let headerColorClass = getClassColor(selectedCell.className).split(' ')[0].replace('-100', '-500');
            if(headerColorClass === 'bg-transparent' || !headerColorClass) headerColorClass = 'bg-gray-800';

            let recordsHtml = '';
            if (records.length === 0) {
                recordsHtml = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-4">
                        <i data-lucide="history" class="w-12 h-12 opacity-20"></i>
                        <p class="font-medium text-sm">아직 작성된 진도 기록이 없습니다.</p>
                        <button onclick="window.addRecord()" class="px-6 py-3 bg-indigo-50 text-indigo-600 font-bold rounded-2xl shadow-sm hover:bg-indigo-100 transition-colors">
                            첫 기록 작성하기
                        </button>
                    </div>
                `;
            } else {
                recordsHtml = `<div class="space-y-2 mt-2">` + records.map((record, index) => {
                    const isEditing = editingRecordId === record.id;
                    const isFirst = index === 0;

                    return `
                    <div class="relative pl-6 pb-8 border-l-2 border-indigo-100 last:border-transparent last:pb-0">
                        <div class="absolute w-4 h-4 rounded-full -left-[9px] top-1 border-4 border-white shadow-sm ${isFirst ? 'bg-indigo-500 scale-125' : 'bg-gray-300'}"></div>
                        
                        <div class="bg-white rounded-3xl p-5 border ${isEditing ? 'border-indigo-400 shadow-md ring-4 ring-indigo-50' : 'border-gray-100 shadow-sm'} transition-all">
                            
                            <div class="flex justify-between items-center mb-4">
                                ${isEditing ? `
                                    <input type="text" value="${record.date}" oninput="window.updateRecordField('${record.id}', 'date', this.value)"
                                           class="font-bold text-sm bg-gray-50 text-gray-800 px-3 py-1 rounded-lg outline-none border border-gray-200 focus:border-indigo-500 w-32" />
                                ` : `
                                    <span class="font-bold text-sm text-gray-500">${record.date}</span>
                                `}

                                <div class="flex gap-2">
                                    ${isEditing ? `
                                        <button onclick="window.deleteRecord('${record.id}')" class="p-1.5 text-red-400 hover:bg-red-50 rounded-lg transition-colors">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="window.finishEdit()" class="flex items-center gap-1 bg-gray-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm hover:bg-gray-800 transition-colors">
                                            <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> 완료
                                        </button>
                                    ` : `
                                        <button onclick="window.setEditing('${record.id}')" class="p-1.5 text-gray-400 hover:bg-gray-50 rounded-lg transition-colors">
                                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                                        </button>
                                    `}
                                </div>
                            </div>

                            <div class="space-y-4">
                                <div ${isEditing ? `onclick="window.toggleWorksheet(event, '${record.id}')"` : ''} 
                                     class="flex justify-between items-center p-3 rounded-xl transition-colors ${isEditing ? 'cursor-pointer hover:bg-gray-50 border border-gray-100' : ''}">
                                    <span class="worksheet-text text-sm font-bold flex items-center gap-2 ${record.worksheetGiven ? 'text-indigo-500' : 'text-gray-400'}">
                                        <i data-lucide="file-text" class="w-4 h-4"></i> 활동지 배부
                                    </span>
                                    <div class="worksheet-icon">
                                        ${record.worksheetGiven ? '<i data-lucide="check-circle-2" class="text-indigo-600 w-6 h-6"></i>' : '<i data-lucide="circle" class="text-gray-300 w-6 h-6"></i>'}
                                    </div>
                                </div>

                                <div class="bg-gray-50/50 rounded-xl p-3 border border-gray-100">
                                    <label class="text-xs font-bold text-gray-400 uppercase flex items-center gap-1 mb-1.5">
                                        <i data-lucide="book-open" class="w-3 h-3"></i> 어디까지 했나
                                    </label>
                                    ${isEditing ? `
                                        <input type="text" value="${record.currentProgress}" oninput="window.updateRecordField('${record.id}', 'currentProgress', this.value)" placeholder="진도를 입력하세요"
                                               class="w-full bg-white text-gray-900 text-sm font-semibold rounded-lg px-3 py-2 outline-none border border-indigo-200 focus:border-indigo-500" />
                                    ` : `
                                        <p class="text-sm font-semibold text-gray-800">${record.currentProgress || '-'}</p>
                                    `}
                                </div>

                                <div class="bg-gray-50/50 rounded-xl p-3 border border-gray-100">
                                    <label class="text-xs font-bold text-gray-400 uppercase flex items-center gap-1 mb-1.5">
                                        <i data-lucide="map-pin" class="w-3 h-3"></i> 다음 수업 계획
                                    </label>
                                    ${isEditing ? `
                                        <textarea oninput="window.updateRecordField('${record.id}', 'nextLesson', this.value)" placeholder="계획을 입력하세요"
                                                  class="w-full bg-white text-gray-900 text-sm font-medium rounded-lg px-3 py-2 outline-none border border-indigo-200 focus:border-indigo-500 resize-none h-20">${record.nextLesson}</textarea>
                                    ` : `
                                        <p class="text-sm font-medium text-gray-700 whitespace-pre-wrap">${record.nextLesson || '-'}</p>
                                    `}
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('') + '</div>';
            }

            container.innerHTML = `
                <header class="pt-12 pb-6 px-6 ${headerColorClass} text-white flex-shrink-0 transition-colors duration-300 shadow-sm z-10">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="window.closeDetail()" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/30 backdrop-blur-sm transition-colors">
                            <i data-lucide="chevron-left" class="w-6 h-6" stroke-width="2.5"></i>
                        </button>
                        <button onclick="window.addRecord()" class="flex items-center gap-1.5 px-4 h-10 bg-white text-gray-900 rounded-full text-sm font-bold shadow-lg hover:scale-105 active:scale-95 transition-transform">
                            <i data-lucide="plus" class="w-[18px] h-[18px]" stroke-width="3"></i> 새 기록
                        </button>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 text-white/80 text-sm font-bold mb-1.5">
                            <i data-lucide="clock" class="w-4 h-4"></i> 
                            ${selectedCell.day}요일 ${selectedCell.period}교시 
                            <span class="opacity-70 ml-1">(${periodTimes[selectedCell.period]})</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <h2 class="text-3xl font-extrabold tracking-tight">${selectedCell.className}</h2>
                            <div class="text-white/80 text-xs font-semibold flex items-center gap-1">
                                <i data-lucide="history" class="w-3.5 h-3.5"></i> 총 ${records.length}개
                            </div>
                        </div>
                    </div>
                </header>

                <div class="flex-1 overflow-y-auto p-6 bg-white">
                    ${recordsHtml}
                    <div class="h-12"></div>
                </div>
            `;
            refreshIcons();
        }

        function renderSettings() {
            const container = document.getElementById('settings-screen');
            
            let periodTimesHtml = periods.map(period => `
                <div class="flex items-center bg-gray-50 rounded-xl p-1.5 border border-gray-200">
                    <span class="w-8 text-center text-xs font-black text-gray-500">${period}</span>
                    <input type="text" value="${tempPeriodTimes[period] || ''}" oninput="window.updateTempPeriod(${period}, this.value)"
                           placeholder="08:50~09:35" class="flex-1 bg-transparent text-xs font-semibold text-gray-800 outline-none w-full px-1" />
                </div>
            `).join('');

            let daysHtml = days.map(day => `
                <button onclick="window.setSettingsDay('${day}')" class="flex-1 py-2 text-sm font-bold rounded-xl transition-all ${
                    selectedDay === day ? 'bg-gray-100 text-indigo-600 shadow-inner' : 'text-gray-500'
                }">${day}</button>
            `).join('');

            let classInputsHtml = periods.map(period => `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center font-black text-indigo-600 border border-indigo-100">
                        ${period}
                    </div>
                    <input type="text" value="${tempTimetable[selectedDay]?.[period] || ''}" oninput="window.updateTempClass('${selectedDay}', ${period}, this.value)"
                           placeholder="반 이름 입력 (예: 1학년 1반)" class="flex-1 bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 focus:bg-white text-sm font-bold text-gray-800 transition-colors" />
                </div>
            `).join('');

            container.innerHTML = `
                <header class="pt-12 pb-4 px-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <button onclick="window.closeSettings()" class="p-2 -ml-2 text-gray-500 hover:text-gray-900 rounded-full transition-colors">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                    <h2 class="text-lg font-bold text-gray-900">시간표 설정</h2>
                    <button onclick="window.saveSettings()" class="px-4 py-2 bg-indigo-600 text-white text-sm font-bold rounded-xl shadow-sm hover:bg-indigo-700 transition-colors">
                        저장
                    </button>
                </header>

                <div class="flex-1 overflow-y-auto bg-gray-50 pb-20">
                    
                    <!-- 사용자 정보 (로그아웃 영역) -->
                    <div class="p-4 bg-white mb-2 shadow-sm border-b border-gray-100 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-200">
                                ${user?.photoURL ? `<img src="${user.photoURL}" alt="profile" class="w-full h-full object-cover">` : `<i data-lucide="user" class="text-gray-400 w-5 h-5"></i>`}
                            </div>
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-gray-800">${user?.displayName || '선생님'}</span>
                                <span class="text-xs text-gray-500">${user?.email || '이메일 정보 없음'}</span>
                            </div>
                        </div>
                        <button onclick="window.logout()" class="px-3 py-1.5 border border-red-200 text-red-600 text-xs font-bold rounded-lg hover:bg-red-50 transition-colors">
                            로그아웃
                        </button>
                    </div>

                    <div class="p-4 bg-white mb-2 shadow-sm border-b border-gray-100">
                        <h3 class="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i data-lucide="clock" class="text-indigo-600 w-4 h-4"></i> 교시별 시간 설정
                        </h3>
                        <div class="grid grid-cols-2 gap-2">
                            ${periodTimesHtml}
                        </div>
                    </div>

                    <div class="bg-white shadow-sm">
                        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <h3 class="text-sm font-bold text-gray-800 flex items-center gap-2">
                                <i data-lucide="book-open" class="text-indigo-600 w-4 h-4"></i> 수업 배정
                            </h3>
                        </div>
                        
                        <div class="flex bg-white border-b border-gray-200 px-2 py-2 sticky top-0 z-10">
                            ${daysHtml}
                        </div>

                        <div class="p-4 space-y-3">
                            ${classInputsHtml}
                        </div>
                    </div>
                </div>
            `;
            refreshIcons();
        }

        // 아이콘 초기화 대응
        window.onload = () => refreshIcons();
    </script>
</body>
</html>
